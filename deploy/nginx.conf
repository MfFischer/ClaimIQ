# ─── Nginx config for ClaimIQ on VPS ─────────────────────────────────────────
# Place at: /etc/nginx/sites-available/claimiq
# Then: sudo ln -s /etc/nginx/sites-available/claimiq /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN with your actual domain or VPS IP.

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Redirect all HTTP to HTTPS (uncomment after adding SSL)
    # return 301 https://$host$request_uri;

    # ── API — proxy to FastAPI on port 8000 ──────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeout for OCR + AI processing (can take up to 60s)
        proxy_read_timeout    120s;
        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;

        # File upload size — match MAX_FILE_SIZE_MB in .env
        client_max_body_size 15M;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # ── Frontend — proxy to Next.js on port 3000 ─────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml
                    application/xml+rss text/javascript;
}

